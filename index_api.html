:root{--navy:#1f3864;--navy2:#2e5496;--green:#16a766;--green2:#0f7a4a;--amber:#d9a300;--red:#d64545;--bg:#f4f6fb;--card:#fff;--line:#e3e8f0;--text:#1f2937;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif}
body{background:var(--bg);color:var(--text)}
#login{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),#0f1d38);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.loginbox{background:#fff;border-radius:16px;padding:30px;width:380px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.loginbox .logo{width:52px;height:52px;border-radius:13px;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:23px;margin:0 auto 12px}
.loginbox h2{text-align:center;color:var(--navy);font-size:18px}.loginbox p{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:14px}
.loginbox label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
.loginbox input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;outline:none}
.loginbox .btn{width:100%;margin-top:14px}.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:10px}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.apibar{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;margin-bottom:6px}
.apibar input{border:none;background:transparent;font-size:12px;flex:1;outline:none}
.dot{width:9px;height:9px;border-radius:50%;background:#bbb}.dot.ok{background:var(--green)}.dot.bad{background:var(--red)}
.app{display:none}.app.on{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,var(--navy),#162a4d);color:#fff;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:30;overflow-y:auto}
.brand{padding:17px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800}
.brand h1{font-size:14px}.brand small{color:#9fb3d8;font-size:11px;font-weight:400}
.nav .group{padding:9px 17px 3px;font-size:10px;letter-spacing:.08em;color:#7f96c4;text-transform:uppercase}
.nav a{display:flex;gap:10px;padding:9px 17px;color:#cdd8ef;font-size:13px;cursor:pointer;border-left:3px solid transparent}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}.nav a.active{background:rgba(22,167,102,.16);border-left-color:var(--green);color:#fff;font-weight:600}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:58px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:20}
.topbar .ttl{font-size:17px;font-weight:700;color:var(--navy)}
.topbar .right{display:flex;align-items:center;gap:10px}
.mode{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}.mode.api{background:#e6f6ee;color:var(--green2)}.mode.demo{background:#fff6e0;color:#a6790a}
.cur{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:13px}

.lo,.cp{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--muted)}
.content{padding:20px;max-width:1240px;width:100%}

.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;position:relative;overflow:hidden}

.panel h3{font-size:14px;color:var(--navy);margin-bottom:13px}
table{width:100%;border-collapse:collapse;font-size:13px}

.right{text-align:right}.b{font-weight:700}

.mini{font-size:11px;color:var(--muted)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;align-items:center;justify-content:center}.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:430px;max-width:94vw;max-height:90vh;overflow:auto}.modal h3{color:var(--navy);margin-bottom:14px}

.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;outline:none}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%)}

async function ping(){window.LIFTERS_API_BASE=document.getElementById('apibase').value.trim();const dot=document.getElementById('dot');
 try{const r=await fetch(window.LIFTERS_API_BASE+'/health');dot.className='dot '+(r.ok?'ok':'bad');return r.ok;}catch{dot.className='dot bad';return false;}}

async function doLogin(){
 window.LIFTERS_API_BASE=document.getElementById('apibase').value.trim();
 const err=document.getElementById('err');err.textContent='Signing in...';
 try{
   const d=await Api.login(document.getElementById('lg_id').value.trim(),document.getElementById('lg_pw').value);

function exportMembersCsv(){const rows=[['ID','Member','Status','Savings']];DATA.members.forEach(m=>rows.push([m.no,m.name,m.status,m.savings]));
 const csv=rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
 const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='lifters_members.csv';a.click();}
