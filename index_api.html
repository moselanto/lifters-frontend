<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif}
body{background:var(--bg);color:var(--text)}
#login{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),#0f1d38);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.loginbox{background:#fff;border-radius:16px;padding:32px;width:380px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.loginbox .logo{width:54px;height:54px;border-radius:13px;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:24px;margin:0 auto 14px}
.loginbox h2{text-align:center;color:var(--navy);font-size:18px}.loginbox p{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:14px}
.loginbox label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
.loginbox input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;outline:none}
.loginbox .btn{width:100%;margin-top:16px}.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:10px}
.err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.apibar{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;margin-bottom:6px}
.apibar input{border:none;background:transparent;font-size:12px;flex:1;outline:none}
.dot{width:9px;height:9px;border-radius:50%;background:#bbb}.dot.ok{background:var(--green)}.dot.bad{background:var(--red)}
.app{display:none}.app.on{display:flex;min-height:100vh}
.sidebar{width:235px;background:linear-gradient(180deg,var(--navy),#162a4d);color:#fff;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:30}
.brand{padding:18px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px}
.brand .logo{width:36px;height:36px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800}
.brand h1{font-size:14px}.brand small{color:#9fb3d8;font-size:11px;font-weight:400}

.main{margin-left:235px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:20}
.topbar .ttl{font-size:18px;font-weight:700;color:var(--navy)}
.topbar .right{display:flex;align-items:center;gap:12px}
.mode{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}.mode.api{background:#e6f6ee;color:var(--green2)}.mode.demo{background:#fff6e0;color:#a6790a}
.cur{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px}
.cur select{border:none;background:transparent;font-weight:600;color:var(--navy);cursor:pointer;outline:none}
.lo{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--muted)}
.content{padding:22px;max-width:1240px;width:100%}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:15px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;position:relative;overflow:hidden}
.kpi .lab{color:var(--muted);font-size:12px;margin-bottom:5px}.kpi .val{font-size:21px;font-weight:800;color:var(--navy)}

table{width:100%;border-collapse:collapse;font-size:13px}

.right{text-align:right}.b{font-weight:700}

function money(g){return SYM[CUR]+((g||0)*RATES[CUR]).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function setCur(c){CUR=c;render(page);}
let MODE='demo'; // 'api' or 'demo'
let STATE={members:[],loans:[]};
let page='dashboard';
const titles={dashboard:'Dashboard',members:'Members',savings:'Savings',loans:'Loans'};

document.getElementById('apibase').value = (window.LIFTERS_API_BASE||'http://localhost:4000');
async function ping(){
 window.LIFTERS_API_BASE=document.getElementById('apibase').value.trim();
 const dot=document.getElementById('dot');
 try{ const r=await fetch(window.LIFTERS_API_BASE+'/health'); const ok=r.ok; dot.className='dot '+(ok?'ok':'bad'); return ok; }
 catch{ dot.className='dot bad'; return false; }
}
async function doLogin(){
 window.LIFTERS_API_BASE=document.getElementById('apibase').value.trim();
 const err=document.getElementById('err');err.textContent='';
 try{
   await Api.login(document.getElementById('lg_id').value, document.getElementById('lg_pw').value);
   MODE='api'; await loadFromApi(); enterApp('API');
 }catch(e){ err.textContent=e.message+'  (or use demo mode below)'; }
}
function demoLogin(){ MODE='demo'; STATE=normalizeSeed(); enterApp('DEMO'); }
function enterApp(label){
 document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');
 const b=document.getElementById('modeBadge');b.textContent=label+' MODE';b.className='mode '+(label==='API'?'api':'demo');
 render('dashboard');
}
function logout(){ if(MODE==='api')Api.logout(); document.getElementById('app').classList.remove('on');document.getElementById('login').style.display='flex'; }

function normalizeSeed(){
 // map the demo seed into the same shape we use from the API
 const members=SEED.members.map(m=>({id:m.id,member_no:m.id,full_name:m.name,status:m.status,
   savings:m.savings.reduce((a,s)=>a+(s.type==='fine'?-s.amount:s.amount),0),welfare:m.welfare,dividend:m.dividend||0}));
 const loans=SEED.loans.map(l=>({loan_no:l.loan_no,member:l.member,principal:l.principal,interest:l.interest,
   net:l.net,repaid:l.repayments.reduce((a,r)=>a+r.amount,0),balance:l.principal-l.repayments.reduce((a,r)=>a+r.amount,0)}));
 return {members,loans};
}
async function loadFromApi(){
 // pull members + savings balances + loans and merge into STATE
 const [members, balances, loans] = await Promise.all([Api.members(), Api.savingsBalances(), Api.loans()]);
 const balById={}; balances.forEach(b=>balById[b.member_id]=Number(b.savings_balance||0));
 STATE.members = members.map(m=>({id:m.id,member_no:m.member_no,full_name:m.full_name,status:m.status,
   savings:balById[m.id]||0,welfare:0,dividend:0}));
 STATE.loans = loans.map(l=>({loan_no:l.loan_no,member:l.member_id,principal:Number(l.principal),
   interest:Number(l.interest_amount),net:Number(l.net_disbursed),repaid:Number(l.repaid||0),balance:Number(l.balance||0)}));
}

function statusTag(s){if((s||'').indexOf('xit')>=0||s==='exited')return '<span class="tag exit">Exited</span>';if((s||'').indexOf('oin')>=0||s==='new')return '<span class="tag join">New</span>';return '<span class="tag cont">Continuing</span>';}
const sum=(arr,f)=>arr.reduce((a,x)=>a+(f(x)||0),0);
function kpi(c,l,v){return `<div class="kpi ${c}"><div class="bar"></div><div class="lab">${l}</div><div class="val">${v}</div></div>`;}

function dashboard(){
